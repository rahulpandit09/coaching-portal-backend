services:
  - type: web
    name: coaching-portal-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python create_admin.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coaching-portal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: coaching-portal-db
    plan: free
